<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LibTrack - Ajouter un étudiant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; }
        .container { max-width: 600px; margin: 50px auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { margin-bottom: 20px; color: #1a2a3a; }
        .form-group { margin-bottom: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #1e293b; }
        input, select { width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 8px; }
        button { background: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: 600; cursor: pointer; }
        .btn-back { background: #64748b; margin-top: 10px; }
        .alert { padding: 10px; border-radius: 8px; margin-bottom: 15px; }
        .alert-success { background: #dcfce7; color: #166534; }
        .alert-error { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-user-graduate"></i> Ajouter un étudiant</h1>
        
        {% if messages %}
            {% for message in messages %}
            <div class="alert alert-{% if message.tags == 'success' %}success{% else %}error{% endif %}">{{ message }}</div>
            {% endfor %}
        {% endif %}
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label>👤 Nom *</label>
                <input type="text" name="nom" placeholder="Nom" required>
            </div>
            <div class="form-group">
                <label>👤 Prénom *</label>
                <input type="text" name="prenom" placeholder="Prénom" required>
            </div>
            <div class="form-group">
                <label>🎓 Classe</label>
                <input type="text" name="classe" placeholder="Ex: L3 Informatique">
            </div>
            <div class="form-group">
                <label>🏛️ Faculté</label>
                <select name="faculte">
                    <option value="GL">Génie Logiciel</option>
                    <option value="IIA">Informatique et IA</option>
                    <option value="RSD">Réseaux et Sécurité</option>
                    <option value="MF">Management Financier</option>
                    <option value="MKG">Marketing Digital</option>
                    <option value="RH">Ressources Humaines</option>
                </select>
            </div>
            <div class="form-group">
                <label>📅 Année</label>
                <select name="annee">
                    <option value="1">1ère année (L1)</option>
                    <option value="2">2ème année (L2)</option>
                    <option value="3">3ème année (L3)</option>
                    <option value="4">Master 1 (M1)</option>
                    <option value="5">Master 2 (M2)</option>
                </select>
            </div>
            <div class="form-group">
                <label>🪪 Carte ID *</label>
                <input type="text" name="carte_id" placeholder="Numéro de carte" required>
            </div>
            <div class="form-group">
                <label>📞 Téléphone</label>
                <input type="text" name="telephone" placeholder="Numéro de téléphone">
            </div>
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" name="email" placeholder="Email (optionnel)">
            </div>
            <button type="submit"><i class="fas fa-save"></i> Ajouter l'étudiant</button>
            <a href="/"><button type="button" class="btn-back">← Retour</button></a>
        </form>
    </div>
</body>
</html>
