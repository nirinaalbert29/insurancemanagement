<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>LibTrack - Étudiants</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: #f0f4f8; }
        .container { max-width: 1200px; margin: 30px auto; background: white; padding: 30px; border-radius: 20px; }
        h1 { margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #e2e8f0; }
        th { background: #f8fafc; }
        .btn-back { background: #64748b; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; text-decoration: none; display: inline-block; }
    </style>
</head>
<body>
    <div class="container">
        <h1><i class="fas fa-users"></i> Liste des étudiants</h1>
        
        {% if etudiants %}
        <table>
            <thead>
                <tr><th>Nom</th><th>Prénom</th><th>Classe</th><th>Carte ID</th><th>Téléphone</th></tr>
            </thead>
            <tbody>
                {% for e in etudiants %}
                <tr><td>{{ e.nom }}</td><td>{{ e.prenom }}</td><td>{{ e.classe }}</td><td>{{ e.carte_id }}</td><td>{{ e.telephone }}</td></tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p>Aucun étudiant enregistré.</p>
        {% endif %}
        
        <a href="/" class="btn-back" style="margin-top:20px; display:inline-block;">← Retour</a>
    </div>
</body>
</html>
